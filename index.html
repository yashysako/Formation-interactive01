<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="Ember Académie — La formation interactive complète pour apprendre le trading Forex, crypto et commodités. Progressez à votre rythme avec des exercices pratiques sur de vrais graphiques.">
<title>Ember Académie — Apprends à trader. Pour de vrai.</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ============================================================
   RESET & TOKENS
   ============================================================ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
html { overflow-x: hidden; }
body {
  background: #0b0906;
  color: #f5ece0;
  font-family: "Inter", -apple-system, "Segoe UI", sans-serif;
  line-height: 1.6;
  scroll-padding-top: 64px;
}
:root {
  --bg: #0b0906;
  --bg-2: #131009;
  --bg-3: #1c1610;
  --border: #2e2318;
  --border-hi: #4a3520;
  --e1: #ff4d1f;
  --e2: #ff8a1e;
  --e3: #ffc24b;
  --text: #f5ece0;
  --text-2: #c0a882;
  --text-3: #7a6a55;
  --ok: #36c98e;
  --radius: 12px;
  --d: "Oswald", "Arial Narrow", sans-serif;
  --m: "JetBrains Mono", "Consolas", monospace;
}
a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; }
img { display: block; max-width: 100%; }
:focus-visible { outline: 2px solid var(--e3); outline-offset: 3px; }

/* ============================================================
   UTILITIES
   ============================================================ */
.sr-only { position: absolute; width: 1px; height: 1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; }
.container { width: 100%; max-width: 1100px; margin: 0 auto; padding: 0 24px; }
.tag {
  display: inline-block;
  font-family: var(--m);
  font-size: 10px;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: var(--e3);
  border: 1px solid rgba(255,178,60,0.3);
  border-radius: 20px;
  padding: 4px 12px;
  margin-bottom: 16px;
}
.ember-text {
  background: linear-gradient(90deg, var(--e1), var(--e3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.btn-primary {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 14px 28px;
  background: linear-gradient(135deg, var(--e1), var(--e2));
  color: #1a0d04;
  font-family: var(--d);
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.04em;
  border-radius: 10px;
  box-shadow: 0 6px 28px rgba(255,90,20,0.35);
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 10px 36px rgba(255,90,20,0.45); }
.btn-primary:active { transform: none; }
.btn-secondary {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  padding: 13px 26px;
  background: var(--bg-3);
  color: var(--text);
  font-family: var(--d);
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.04em;
  border-radius: 10px;
  border: 1px solid var(--border-hi);
  transition: border-color 0.15s ease;
}
.btn-secondary:hover { border-color: var(--e2); }

/* ============================================================
   TICKER TAPE
   ============================================================ */

/* ============================================================
   NAVIGATION
   ============================================================ */
.nav {
  position: -webkit-sticky;
  position: sticky;
  top: 0;
  z-index: 100;
  background: rgba(11,9,6,0.92);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
}
.nav-inner {
  display: flex;
  align-items: center;
  justify-content: space-between;
  height: 64px;
}

.nav-logo {
  display: flex;
  align-items: center;
  gap: 10px;
}
.nav-flame {
  width: 28px;
  height: 28px;
  color: var(--e2);
}
.nav-flame svg { width: 100%; height: 100%; }
.nav-logo-text {
  font-family: var(--d);
  font-weight: 700;
  font-size: 17px;
  letter-spacing: 0.08em;
}
.nav-logo-text em {
  font-style: normal;
  font-size: 11px;
  letter-spacing: 0.16em;
  color: var(--text-3);
  display: block;
  font-family: var(--m);
  text-transform: uppercase;
  margin-top: -4px;
}
.nav-right {
  display: flex;
  align-items: center;
  gap: 12px;
}
.lang-toggle {
  display: flex;
  background: var(--bg-3);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.lang-btn {
  padding: 6px 12px;
  font-family: var(--m);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--text-3);
  transition: background 0.15s ease, color 0.15s ease;
}
.lang-btn.active {
  background: var(--border-hi);
  color: var(--e3);
}
.nav-cta {
  padding: 8px 16px;
  background: linear-gradient(135deg, var(--e1), var(--e2));
  color: #1a0d04;
  font-family: var(--d);
  font-weight: 600;
  font-size: 13px;
  letter-spacing: 0.04em;
  border-radius: 8px;
  white-space: nowrap;
}
.nav-cta:hover { opacity: 0.9; }
/* Texte court sur mobile pour laisser la place au toggle FR/EN */
@media (max-width: 480px) {
  .nav-cta {
    font-size: 11px;
    padding: 7px 12px;
    letter-spacing: 0.02em;
  }
}
.nav-mobile-menu { display: none; color: var(--text-2); }
.nav-mobile-menu svg { width: 22px; height: 22px; }

/* ============================================================
   HERO
   ============================================================ */
.hero {
  position: relative;
  min-height: 88vh;
  display: flex;
  align-items: center;
  overflow: hidden;
}
.hero-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
}
/* Ember glow radial */
.hero-bg::before {
  content: "";
  position: absolute;
  top: -20%;
  right: -10%;
  width: 70%;
  height: 80%;
  background: radial-gradient(ellipse, rgba(255,90,20,0.08) 0%, transparent 65%);
  pointer-events: none;
}
/* Candlestick chart background */
.hero-candles {
  position: absolute;
  bottom: 0;
  right: 0;
  width: 55%;
  height: 100%;
  opacity: 0.06;
}
.hero-inner {
  position: relative;
  z-index: 1;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 60px;
  align-items: center;
  padding: 80px 0 60px;
}
.hero-left {}
.hero-eyebrow {
  font-family: var(--m);
  font-size: 11px;
  letter-spacing: 0.22em;
  color: var(--e3);
  text-transform: uppercase;
  margin-bottom: 18px;
}
.hero-h1 {
  font-family: var(--d);
  font-weight: 700;
  font-size: clamp(36px, 5vw, 58px);
  line-height: 1.08;
  letter-spacing: 0.02em;
  margin-bottom: 20px;
}
.hero-sub {
  font-size: 17px;
  color: var(--text-2);
  line-height: 1.65;
  max-width: 460px;
  margin-bottom: 34px;
}
.hero-actions {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
}
.hero-social-proof {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-top: 24px;
}
.hero-avatars {
  display: flex;
}
.hero-avatar {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  border: 2px solid var(--bg);
  margin-left: -8px;
  background: var(--bg-3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--d);
  font-size: 13px;
  font-weight: 600;
  color: var(--e2);
  flex-shrink: 0;
}
.hero-avatars .hero-avatar:first-child { margin-left: 0; }
.hero-proof-text {
  font-size: 13px;
  color: var(--text-3);
}
.hero-proof-text strong { color: var(--text-2); }

/* Hero right: floating module preview card */
.hero-right {
  display: flex;
  justify-content: center;
  align-items: center;
}
.module-preview {
  width: 100%;
  max-width: 400px;
  position: relative;
}
.module-card-glow {
  position: absolute;
  inset: -30px;
  background: radial-gradient(ellipse, rgba(255,138,30,0.12) 0%, transparent 70%);
  pointer-events: none;
}
.module-card-main {
  background: var(--bg-2);
  border: 1px solid var(--border-hi);
  border-radius: 16px;
  padding: 24px;
  position: relative;
  z-index: 1;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.module-card-label {
  font-family: var(--m);
  font-size: 10px;
  letter-spacing: 0.15em;
  color: var(--text-3);
  text-transform: uppercase;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.module-card-label::before {
  content: "";
  display: block;
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--ok);
  animation: pulse-dot 2s infinite;
}
@keyframes pulse-dot { 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:0.5; transform:scale(0.8); } }
.module-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.module-row {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 8px;
  background: var(--bg-3);
  border: 1px solid transparent;
  transition: border-color 0.3s ease;
}
.module-row.active {
  border-color: var(--border-hi);
  background: rgba(255,138,30,0.06);
}
.module-row-icon {
  width: 28px;
  height: 28px;
  border-radius: 6px;
  background: rgba(255,138,30,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--e2);
  flex-shrink: 0;
}
.module-row-icon svg { width: 14px; height: 14px; }
.module-row-info { flex: 1; min-width: 0; }
.module-row-title {
  font-family: var(--d);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.02em;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.module-row.active .module-row-title { color: var(--e3); }
.module-row:not(.active) .module-row-title { color: var(--text-2); }
.module-row-sub {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 1px;
}
.module-row-check {
  width: 18px;
  height: 18px;
  border-radius: 50%;
  border: 1px solid var(--border);
  flex-shrink: 0;
  display: flex;
  align-items: center;
  justify-content: center;
}
.module-row.done .module-row-check {
  background: var(--ok);
  border-color: var(--ok);
  color: #0b0906;
}
.module-row.done .module-row-check svg { width: 10px; height: 10px; }
.module-row.active .module-row-check { border-color: var(--e2); }

/* ============================================================
   STATS STRIP
   ============================================================ */
.stats {
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  background: var(--bg-2);
  padding: 28px 0;
}
.stats-inner {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px;
  background: var(--border);
}
.stat-box {
  background: var(--bg-2);
  padding: 20px 24px;
  text-align: center;
}
.stat-num {
  font-family: var(--d);
  font-weight: 700;
  font-size: 38px;
  letter-spacing: -0.01em;
  line-height: 1;
  background: linear-gradient(135deg, var(--e2), var(--e3));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 4px;
}
.stat-label {
  font-family: var(--m);
  font-size: 11px;
  letter-spacing: 0.12em;
  color: var(--text-3);
  text-transform: uppercase;
}

/* ============================================================
   SECTION TEMPLATE
   ============================================================ */
.section {
  padding: 100px 0;
}
.section-header {
  text-align: center;
  margin-bottom: 60px;
}
.section-h2 {
  font-family: var(--d);
  font-weight: 700;
  font-size: clamp(28px, 4vw, 44px);
  letter-spacing: 0.02em;
  margin-bottom: 14px;
  line-height: 1.1;
}
.section-sub {
  font-size: 16px;
  color: var(--text-2);
  max-width: 520px;
  margin: 0 auto;
  line-height: 1.65;
}

/* ============================================================
   HOW IT WORKS
   ============================================================ */
.how { background: var(--bg-2); }
.how-steps {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 2px;
  background: var(--border);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.how-step {
  background: var(--bg-2);
  padding: 32px 24px;
  position: relative;
}
.how-step-num {
  font-family: var(--m);
  font-size: 11px;
  letter-spacing: 0.1em;
  color: var(--text-3);
  margin-bottom: 16px;
}
.how-step-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  background: rgba(255,138,30,0.1);
  border: 1px solid rgba(255,138,30,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--e2);
  margin-bottom: 16px;
}
.how-step-icon svg { width: 22px; height: 22px; }
.how-step-title {
  font-family: var(--d);
  font-weight: 600;
  font-size: 17px;
  letter-spacing: 0.03em;
  color: var(--text);
  margin-bottom: 8px;
}
.how-step-desc {
  font-size: 14px;
  color: var(--text-2);
  line-height: 1.6;
}
.how-step-arrow {
  position: absolute;
  top: 50%;
  right: -14px;
  transform: translateY(-50%);
  width: 28px;
  height: 28px;
  background: var(--bg-3);
  border: 1px solid var(--border-hi);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--e2);
  z-index: 1;
}
.how-step-arrow svg { width: 12px; height: 12px; }
.how-step:last-child .how-step-arrow { display: none; }

/* ============================================================
   MODULES GRID
   ============================================================ */
.modules { background: var(--bg-2); }
.modules-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}
.module-tile {
  background: var(--bg-3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 22px 18px;
  transition: border-color 0.2s ease, transform 0.2s ease;
}
.module-tile:hover {
  border-color: var(--border-hi);
  transform: translateY(-2px);
}
.module-tile-icon {
  width: 36px;
  height: 36px;
  border-radius: 8px;
  background: rgba(255,138,30,0.1);
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--e2);
  margin-bottom: 14px;
}
.module-tile-icon svg { width: 18px; height: 18px; }
.module-tile-num {
  font-family: var(--m);
  font-size: 10px;
  color: var(--text-3);
  letter-spacing: 0.1em;
  margin-bottom: 4px;
}
.module-tile-title {
  font-family: var(--d);
  font-size: 14px;
  font-weight: 600;
  letter-spacing: 0.03em;
  color: var(--text);
  margin-bottom: 6px;
}
.module-tile-sub {
  font-size: 12px;
  color: var(--text-3);
  line-height: 1.5;
}

/* ============================================================
   REVIEWS
   ============================================================ */
.reviews { background: var(--bg); }
.reviews-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
}
.review-card {
  background: var(--bg-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 14px;
  transition: border-color 0.2s ease;
}
.review-card:hover { border-color: var(--border-hi); }
.review-stars {
  display: flex;
  gap: 3px;
  color: var(--e3);
}
.review-stars svg { width: 14px; height: 14px; }
.review-body {
  font-size: 14.5px;
  color: var(--text-2);
  line-height: 1.65;
  flex: 1;
  font-style: italic;
}
.review-body::before { content: "\201C"; color: var(--e3); font-size: 20px; line-height: 0; vertical-align: -6px; margin-right: 2px; }
.review-author {
  display: flex;
  align-items: center;
  gap: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.review-avatar {
  width: 34px;
  height: 34px;
  border-radius: 50%;
  background: rgba(255,138,30,0.12);
  border: 1px solid rgba(255,138,30,0.2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: var(--d);
  font-size: 14px;
  font-weight: 600;
  color: var(--e2);
  flex-shrink: 0;
}
.review-name {
  font-family: var(--d);
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.02em;
}
.review-tag {
  font-size: 11px;
  color: var(--text-3);
  margin-top: 1px;
}

/* ============================================================
   FAQ
   ============================================================ */
.faq { background: var(--bg-2); }
.faq-list {
  max-width: 720px;
  margin: 0 auto;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.faq-item {
  background: var(--bg-3);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  overflow: hidden;
}
.faq-q {
  width: 100%;
  text-align: left;
  padding: 18px 22px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  font-family: var(--d);
  font-weight: 600;
  font-size: 15px;
  letter-spacing: 0.02em;
  color: var(--text);
  transition: color 0.15s ease;
}
.faq-q:hover { color: var(--e3); }
.faq-q[aria-expanded="true"] { color: var(--e3); }
.faq-icon {
  width: 22px;
  height: 22px;
  border-radius: 50%;
  border: 1px solid var(--border-hi);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  color: var(--e2);
  transition: transform 0.25s ease;
}
.faq-icon svg { width: 12px; height: 12px; }
.faq-q[aria-expanded="true"] .faq-icon { transform: rotate(45deg); }
.faq-a {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.35s ease, padding 0.25s ease;
  padding: 0 22px;
}
.faq-a.open {
  max-height: 400px;
  padding: 0 22px 18px;
}
.faq-a p {
  font-size: 14.5px;
  color: var(--text-2);
  line-height: 1.7;
}

/* ====
  /* ========================================================
     PRICING redesigned
     ======================================================== */
  .pricing {
    background: var(--bg);
    position: relative;
    overflow: hidden;
  }
  .pricing::before {
    content: "";
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 700px; height: 500px;
    background: radial-gradient(ellipse, rgba(255,90,20,0.09) 0%, transparent 65%);
    pointer-events: none;
  }
  .pricing::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image: radial-gradient(circle, rgba(255,178,60,0.06) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
  }
  .pricing-wrap {
    max-width: 520px;
    margin: 0 auto;
    position: relative;
    z-index: 1;
  }
  .pricing-halo {
    position: absolute;
    inset: -20px;
    border-radius: 28px;
    background: radial-gradient(ellipse, rgba(255,138,30,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .pricing-card {
    position: relative;
    z-index: 1;
    background: linear-gradient(160deg, #1e1610 0%, #141009 60%, #1c1410 100%);
    border-radius: 20px;
    overflow: hidden;
    box-shadow: 0 0 0 1px rgba(255,178,60,0.18), 0 24px 80px rgba(0,0,0,0.55), inset 0 1px 0 rgba(255,178,60,0.1);
  }
  .pricing-top-bar {
    height: 3px;
    background: linear-gradient(90deg, var(--e1) 0%, var(--e2) 45%, var(--e3) 100%);
  }
  .pricing-body {
    padding: 40px 38px 36px;
  }
  .pricing-header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
  .pricing-plan-name {
    font-family: var(--m);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--text-3);
  }
  .pricing-badge {
    font-family: var(--m);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #1a0d04;

========================================================

   ============================================================ */
.access {
  background: var(--bg);
  padding: 120px 0;
  position: relative;
  overflow: hidden;
}
/* Fond ember profond */
.access::before {
  content: ""; position: absolute;
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  width: 100%; height: 100%;
  background: radial-gradient(ellipse 60% 70% at 50% 50%, rgba(255,90,20,0.08) 0%, transparent 70%);
  pointer-events: none;
}
/* Grille de points subtile */
.access::after {
  content: ""; position: absolute; inset: 0; pointer-events: none;
  background-image: radial-gradient(circle, rgba(255,178,60,0.06) 1px, transparent 1px);
  background-size: 34px 34px;
}
.access-inner {
  position: relative; z-index: 1;
  max-width: 640px; margin: 0 auto; text-align: center;
}
.access-icon { width: 48px; height: 48px; margin: 0 auto 18px; color: var(--e2); }
.access-icon svg { width: 100%; height: 100%; }
.access-h2 {
  font-family: var(--d); font-weight: 700;
  font-size: clamp(30px, 4vw, 48px);
  letter-spacing: 0.04em; margin-bottom: 14px;
}
.access-sub {
  font-size: 15px; color: var(--text-2);
  margin-bottom: 44px; line-height: 1.7;
}
/* Carte formulaire immersive — fondue dans le fond */
.access-form {
  background: linear-gradient(160deg, rgba(30,22,16,0.85) 0%, rgba(20,16,9,0.9) 100%);
  border: 1px solid rgba(255,178,60,0.18);
  border-radius: 18px;
  padding: 40px 36px 34px;
  text-align: left;
  box-shadow:
    0 0 0 1px rgba(255,178,60,0.06) inset,
    0 24px 60px rgba(0,0,0,0.5);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}
/* Ligne ember en haut du formulaire */
.access-form::before {
  content: ""; display: block;
  height: 2px; margin: -32px -28px 28px;
  background: linear-gradient(90deg, transparent, var(--e2), transparent);
  border-radius: 18px 18px 0 0;
}
.access-form-label {
  font-family: var(--m); font-size: 11px;
  letter-spacing: 0.16em; color: var(--text-3);
  text-transform: uppercase; margin-bottom: 12px; display: block;
}
.access-input-row { display: flex; gap: 10px; margin-bottom: 12px; }
.access-input {
  flex: 1; padding: 16px 20px;
  background: rgba(11,9,6,0.6);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text); font-family: var(--m);
  font-size: 15px; letter-spacing: 0.08em; text-transform: uppercase;
  transition: border-color 0.15s ease, box-shadow 0.15s ease;
}
.access-input:focus {
  outline: none; border-color: var(--e2);
  box-shadow: 0 0 0 3px rgba(255,138,30,0.1);
}
.access-input::placeholder { color: var(--text-3); text-transform: none; letter-spacing: 0; }
.access-btn {
  padding: 16px 26px;
  background: linear-gradient(135deg, var(--e1), var(--e2));
  color: #1a0d04; font-family: var(--d); font-weight: 700;
  font-size: 15px; letter-spacing: 0.05em; border-radius: 10px;
  white-space: nowrap; cursor: pointer; border: none;
  box-shadow: 0 6px 20px rgba(255,90,20,0.3);
  transition: opacity 0.15s ease, transform 0.15s ease;
}
.access-btn:hover { opacity: 0.9; transform: translateY(-1px); }
.access-error {
  color: #ff8080; font-size: 13px; font-family: var(--m);

}
.access-error.show { display: block; }
.access-note {
  text-align: center; font-size: 13px;

}
.access-note a { color: var(--e3); transition: opacity 0.15s; }
.access-note a:hover { opacity: 0.8; }
.access-social {
  display: flex; justify-content: center; gap: 12px; margin-top: 14px;
}
.access-social-btn {
  width: 40px; height: 40px; border-radius: 50%;

@media (max-width: 480px) {

  /* ── GAME PREVIEW CAROUSEL ──────────────────────────────── */
  .preview { background: var(--bg); position: relative; overflow: hidden; }
  .preview::before {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 100%, rgba(255,90,20,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .preview-header { text-align: center; margin-bottom: 44px; }
  .preview-wrap {
    position: relative;
    max-width: 900px;
    margin: 0 auto;
  }
  /* ── SCROLL SNAP — centrage natif, zéro calcul JS ── */
  .carousel-track-outer {
    position: relative;
    overflow-x: auto;
    overflow-y: hidden;
    scroll-snap-type: x mandatory;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;      /* Firefox */
    cursor: grab;
    /* Padding pour que la première et dernière slide se centrent */
  }
  .carousel-track-outer::-webkit-scrollbar { display: none; }
  .carousel-track-outer.is-dragging { cursor: grabbing; }

  .carousel-track {
    display: flex;
    gap: 28px;
    align-items: stretch;
    /* Padding inline pour centrer le premier et dernier slide */
  }

  .carousel-slide {
    flex: 0 0 560px;
    width: 560px;
    scroll-snap-align: center;
    position: relative;
    transition: opacity 0.3s ease, box-shadow 0.3s ease;
    opacity: 0.3;
    cursor: pointer;
    border-radius: 14px;
    flex-shrink: 0;
  }
  .carousel-slide.active {
    opacity: 1;
    z-index: 2;
    box-shadow: 0 0 0 2px rgba(255,178,60,0.3), 0 20px 50px rgba(0,0,0,0.5);
  }
  .carousel-slide.adjacent { opacity: 0.55; }
  /* Browser-window card frame */
  .phone-frame {
    position: relative;
    border-radius: 12px;
    background: var(--bg-3);
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(255,178,60,0.12),
      0 20px 60px rgba(0,0,0,0.65),
      0 4px 16px rgba(0,0,0,0.4);
  }
  /* Browser chrome bar */
  .phone-frame::before {
    content: "";
    display: block;
    height: 36px;
    background: #1a1208;
    border-bottom: 1px solid #2e2318;
    flex-shrink: 0;
  }
  /* Browser dots */
  .phone-frame::after {
    content: "";
    position: absolute;
    top: 11px; left: 14px;
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #e1553a;
    box-shadow: 16px 0 0 #e1a43a, 32px 0 0 #3ac85a;
  }
  /* Screenshot image */
  .phone-screen {
    width: 100%;
    display: block;
    object-fit: cover;
    object-position: top;
    max-height: 420px;
  }
  /* Active card glow */
  .carousel-slide.active .phone-frame {
    box-shadow:
      0 0 0 1px rgba(255,178,60,0.35),
      0 28px 80px rgba(0,0,0,0.7),
      0 0 60px rgba(255,90,20,0.12);
  }
  /* Caption */
  .carousel-caption {
    text-align: center;
    margin-top: 36px;
    min-height: 68px;
    transition: opacity 0.3s ease;
  }
  .carousel-caption-title {
    font-family: var(--d);
    font-weight: 600;
    font-size: 18px;
    letter-spacing: 0.03em;
    color: var(--text);
    margin-bottom: 6px;
  }
  .carousel-caption-desc {
    font-size: 14px;
    color: var(--text-3);
    max-width: 440px;
    margin: 0 auto;
    line-height: 1.6;
  }
  /* Arrow buttons */
  .carousel-btn {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--bg-3);
    border: 1px solid var(--border-hi);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-2);
    z-index: 10;
    transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease, transform 0.15s ease;
    cursor: pointer;
  }
  .carousel-btn:hover { border-color: var(--e2); color: var(--e3); background: rgba(255,138,30,0.08); transform: translateY(-50%) scale(1.08); }
  .carousel-btn:active { transform: translateY(-50%) scale(0.96); }
  .carousel-btn svg { width: 18px; height: 18px; }
  .carousel-btn-prev { left: 0; }
  .carousel-btn-next { right: 0; }
  /* Dot indicators */
  .carousel-dots {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 28px;
  }
  .carousel-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--border-hi);
    transition: background 0.2s ease, width 0.25s ease, border-radius 0.25s ease;

  .carousel-dot.active {
    background: var(--e2);
    width: 22px;
    border-radius: 3px;
  }
  /* Counter */

    text-align: center;
    margin-top: 14px;
    font-family: var(--m);
    font-size: 11px;
    color: var(--text-3);
    letter-spacing: 0.1em;
  }

    .carousel-track-outer { padding: 0 40px; }

  }

  /* ── APERÇU DU JEU ──────────────────────────────────── */
  .preview { background: var(--bg); position: relative; overflow: hidden; }
  .preview::before {
    content:""; position:absolute; inset:0; pointer-events:none;
    background: radial-gradient(ellipse 60% 50% at 50% 100%, rgba(255,90,20,0.06), transparent 70%);
  }
  .preview-header { text-align:center; margin-bottom:44px; }
  .preview-wrap   { position:relative; max-width:900px; margin:0 auto; overflow:hidden; width:100%; }

  .c-outer { overflow:hidden; width:100%; position:relative; cursor:grab; user-select:none; max-width:100%; contain:layout paint style; }
  .c-outer.dragging { cursor:grabbing; }
  .c-track {
    position: relative;
    /* hauteur définie par JS après mesure du contenu */
    width: 100%;
  }
  .c-slide {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    box-sizing: border-box;
    padding: 0 70px;
    opacity: 0;
    transition: opacity 0.4s ease;
    pointer-events: none;
  }
  .c-slide.active {
    opacity: 1;
    pointer-events: auto;
  }
  @media(max-width:768px){ .c-slide { padding:0 28px; } }
  @media(max-width:480px){ .c-slide { padding:0 16px; } }

  .c-slide img { width:100%; display:block; border-radius:12px; }

  /* Fondu des bords dans le fond du site */
  .c-slide::after {
    content:""; position:absolute; inset:0; pointer-events:none; z-index:3;
    background:
      linear-gradient(to right,  var(--bg) 0%, transparent 14%, transparent 86%, var(--bg) 100%),
      linear-gradient(to bottom, transparent 55%, var(--bg) 100%);
    border-radius:12px;
  }
  /* Glow ember sur la slide active */
  .c-slide.active::before {
    content:""; position:absolute; inset:-40px 60px;
    background:radial-gradient(ellipse, rgba(255,90,20,0.07) 0%, transparent 65%);
    pointer-events:none; z-index:-1;
  }

}

function t(){ return LANG[currentLang]; }

function setLang(lang){
  currentLang = lang;
  document.documentElement.lang = lang;
  document.querySelectorAll(".lang-btn").forEach(function(b){
    b.classList.toggle("active", b.dataset.lang === lang);
  });
  renderAll();
}


/* ============================================================
   MOBILE MENU
   ============================================================ */
function scrollToSection(selector){
  var el = document.querySelector(selector);
  if(el) el.scrollIntoView({behavior:"smooth", block:"start"});
}

function toggleMobileMenu(){
  var btn = document.getElementById("mobileMenuBtn");
  var nav = document.getElementById("mobileNav");
  var isOpen = nav.classList.contains("open");
  if(isOpen){
    nav.classList.remove("open");
    btn.classList.remove("is-open");
    btn.setAttribute("aria-expanded","false");
    nav.setAttribute("aria-hidden","true");
  } else {
    nav.classList.add("open");
    btn.classList.add("is-open");
    btn.setAttribute("aria-expanded","true");
    nav.setAttribute("aria-hidden","false");
  }
}

function mobileNavTo(selector){
  toggleMobileMenu();
  setTimeout(function(){ scrollToSection(selector); }, 300);
  return false;
}

/* Close mobile menu when clicking outside */
document.addEventListener("click", function(e){
  var nav = document.getElementById("mobileNav");
  var btn = document.getElementById("mobileMenuBtn");
  if(nav && nav.classList.contains("open") && !nav.contains(e.target) && !btn.contains(e.target)){
    toggleMobileMenu();
  }
});

/* Close on resize to desktop */
window.addEventListener("resize", function(){
  if(window.innerWidth > 768){
    var nav = document.getElementById("mobileNav");
    var btn = document.getElementById("mobileMenuBtn");
    if(nav && nav.classList.contains("open")){
      nav.classList.remove("open");
      btn && btn.classList.remove("is-open");
    }
  }
});

   ============================================================ */
function tryAccess(){
  var input = document.getElementById("accessInput");
  var err = document.getElementById("accessError");
  var raw = input.value.replace(/[^A-Z0-9]/gi,"").toUpperCase();
  var h = hashCode(input.value);
  err.classList.remove("show");

  if(raw === DEV_RAW || ACCESS_HASHES.indexOf(h) !== -1){
    window.location.href = GAME_URL;
  } else {
    err.classList.add("show");
    input.focus();
  }
}

});

/* ============================================================
   HERO CANDLESTICK CANVAS (ambient background art)
   ============================================================ */
function drawHeroCandles(){
  var canvas = document.getElementById("heroCanvas");
  if(!canvas) return;
  var parent = canvas.parentElement;
  var w = parent.offsetWidth;
  var h = parent.offsetHeight;
  canvas.width = w;
  canvas.height = h;
  var ctx = canvas.getContext("2d");
  ctx.clearRect(0,0,w,h);

  var cols = Math.ceil(w / 28);
  var prices = [100];
  for(var i=1; i<cols+2; i++){
    prices.push(prices[i-1] + (Math.random()-0.48)*4);
  }
  var minP = Math.min.apply(null,prices);
  var maxP = Math.max.apply(null,prices);
  var range = maxP - minP || 1;
  var pad = range * 0.15;

  function py(p){ return h - ((p - minP + pad) / (range + pad*2)) * h * 0.85 - h*0.075; }

  for(var i=0; i<cols; i++){
    var x = i * 28 + 14;
    var o = prices[i];
    var c = prices[i+1];
    var hi = Math.max(o,c) + Math.random()*2;
    var lo = Math.min(o,c) - Math.random()*2;
    var up = c >= o;
    ctx.strokeStyle = up ? "rgba(54,201,142,0.7)" : "rgba(239,75,75,0.7)";
    ctx.fillStyle = up ? "rgba(54,201,142,0.7)" : "rgba(239,75,75,0.7)";
    ctx.lineWidth = 1.2;
    ctx.beginPath(); ctx.moveTo(x, py(hi)); ctx.lineTo(x, py(lo)); ctx.stroke();
    var yTop = py(Math.max(o,c));
    var yBot = py(Math.min(o,c));
    ctx.fillRect(x-5, yTop, 10, Math.max(yBot-yTop, 2));
  }
}

/* ============================================================
   SCROLL ANIMATIONS
   ============================================================ */
function initScrollAnim(){
  var els = document.querySelectorAll(".fade-in");
  if(!window.IntersectionObserver){ els.forEach(function(e){ e.classList.add("visible"); }); return; }
  var obs = new IntersectionObserver(function(entries){
    entries.forEach(function(en){ if(en.isIntersecting) en.target.classList.add("visible"); });
  }, {threshold:0.1});
  els.forEach(function(e){ obs.observe(e); });
}

/* ============================================================
   CAROUSEL — CSS Scroll Snap natif (centrage parfait garanti)
   ============================================================ */
var carouselIdx = 0;
var carouselScrolling = false;

function carouselBuild(){
  var track = document.getElementById("carouselTrack");
  var outer = document.getElementById("carouselOuter");
  var dots  = document.getElementById("carouselDots");
  if(!track || !outer || !SLIDES || !SLIDES.length) return;

  track.innerHTML = SLIDES.map(function(s, i){
    return (
      '<div class="carousel-slide" data-idx="'+i+'">' +
        '<div class="phone-frame">' +
          '<img class="phone-screen" src="'+s.src+'" alt="" draggable="false" loading="lazy"/>' +
        '</div>' +
      '</div>'
    );
  }).join("");

  dots.innerHTML = SLIDES.map(function(_, i){
    return '<div class="carousel-dot" onclick="carouselGo('+i+')" aria-label="Slide '+(i+1)+'"></div>';
  }).join("");

  /* Calcule le padding inline pour que la 1ère et dernière slide soient centrables */
  function setPadding(){
    var slideW = track.querySelector(".carousel-slide");
    if(!slideW) return;
    var sw = slideW.offsetWidth;
    var ow = outer.clientWidth;
    var pad = Math.max(0, Math.floor((ow - sw) / 2));
    track.style.paddingLeft  = pad + "px";
    track.style.paddingRight = pad + "px";
  }
  setPadding();
  window.addEventListener("resize", function(){
    setPadding();
    carouselGo(carouselIdx);
  });

  /* Détecter le changement de slide via scroll */
  var scrollTimer;
  outer.addEventListener("scroll", function(){
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(function(){
      var slides = document.querySelectorAll(".carousel-slide");
      var outerCenter = outer.getBoundingClientRect().left + outer.clientWidth / 2;
      var closest = 0, minDist = Infinity;
      slides.forEach(function(s, i){
        var r = s.getBoundingClientRect();
        var center = r.left + r.width / 2;
        var dist = Math.abs(center - outerCenter);
        if(dist < minDist){ minDist = dist; closest = i; }
      });
      if(closest !== carouselIdx){
        carouselIdx = closest;
        carouselUpdateUI();
      }
    }, 80);
  }, {passive:true});

  /* Scroll initial vers slide 0 */
  setTimeout(function(){ carouselGo(0, false); }, 50);

  carouselSetupKeys();
  carouselSetupMouseDrag();
}

function carouselUpdateUI(){
  var slides = document.querySelectorAll(".carousel-slide");
  var dots   = document.querySelectorAll(".carousel-dot");
  slides.forEach(function(s, i){
    s.classList.remove("active","adjacent");
    var d = Math.abs(i - carouselIdx);
    if(d === 0) s.classList.add("active");
    else if(d === 1) s.classList.add("adjacent");
  });
  dots.forEach(function(d, i){ d.classList.toggle("active", i === carouselIdx); });
  var slide  = SLIDES[carouselIdx];
  var labels = slide[currentLang] || slide["fr"];
  setText("carouselTitle", labels.title);
  setText("carouselDesc",  labels.desc);
  setText("carouselCounter", (carouselIdx + 1) + " / " + SLIDES.length);
}

function carouselGo(idx, animate){
  idx = Math.max(0, Math.min(idx, SLIDES.length - 1));
  carouselIdx = idx;
  carouselUpdateUI();
  var outer = document.getElementById("carouselOuter");
  var slides = document.querySelectorAll(".carousel-slide");
  if(!outer || !slides[idx]) return;
  var slide  = slides[idx];
  var outerW = outer.clientWidth;
  var slideW = slide.offsetWidth;
  var slideLeft = slide.offsetLeft;
  var targetScroll = slideLeft - (outerW - slideW) / 2;
  outer.scrollTo({
    left: targetScroll,
    behavior: animate === false ? "auto" : "smooth"
  });
}

function carouselMove(dir){ carouselGo(carouselIdx + dir); }

function carouselSetupKeys(){
  document.addEventListener("keydown", function(e){
    if(document.activeElement && document.activeElement.tagName === "INPUT") return;
    if(e.key === "ArrowLeft")  carouselMove(-1);
    if(e.key === "ArrowRight") carouselMove(1);
  });
}

function carouselSetupMouseDrag(){
  var outer = document.getElementById("carouselOuter");
  if(!outer) return;
  var startX = 0, startScroll = 0, dragging = false;

  outer.addEventListener("mousedown", function(e){
    dragging    = true;
    startX      = e.clientX;
    startScroll = outer.scrollLeft;
    outer.style.scrollSnapType = "none"; /* désactive snap pendant le drag */
    outer.classList.add("is-dragging");
  });
  document.addEventListener("mousemove", function(e){
    if(!dragging) return;
    outer.scrollLeft = startScroll - (e.clientX - startX);
  });
  document.addEventListener("mouseup", function(e){
    if(!dragging) return;
    dragging = false;
    outer.classList.remove("is-dragging");
    outer.style.scrollSnapType = "";  /* réactive snap */
    var dx = e.clientX - startX;
    if(Math.abs(dx) > 50) carouselMove(dx < 0 ? 1 : -1);
    else carouselGo(carouselIdx); /* resnap à la slide actuelle */
  });
}

/* ── CAROUSEL ─────────────────────────────────────────── */
function cBuild(){
  var outer = document.getElementById("cOuter");
  var track = document.getElementById("cTrack");
  var dots  = document.getElementById("cDots");
  if(!track || !SLIDES || !SLIDES.length) return;

  track.innerHTML = SLIDES.map(function(s,i){
    return '<div class="c-slide" data-idx="'+i+'"><img src="'+s.src+'" alt="" draggable="false" loading="lazy"></div>';
  }).join("");

  dots.innerHTML = SLIDES.map(function(_,i){
    return '<div class="c-dot" onclick="cGo('+i+')" aria-label="'+(i+1)+'"></div>';
  }).join("");

  cApply(); cGo(0, false); cSwipe();
  window.addEventListener("resize", function(){ cApply(); });
  /* Ajuster la hauteur après chargement des images */
  document.querySelectorAll(".c-slide img").forEach(function(img){
    img.addEventListener("load", function(){ cApply(); });
  });
}

function cApply(){
  /* Ajuster la hauteur du track à la slide active */
  var active = document.querySelector(".c-slide.active");
  var track = document.getElementById("cTrack");
  if(active && track) track.style.height = active.offsetHeight + "px";
  return document.getElementById("cOuter") ? document.getElementById("cOuter").clientWidth : window.innerWidth;
}

function cGo(idx, animate){
  if(animate === undefined) animate = true;
  idx = Math.max(0, Math.min(idx, SLIDES.length-1));
  cIdx = idx;
  cApply();
  /* Pas de translateX: les slides sont en position absolute, on bascule l'opacité */
  document.querySelectorAll(".c-slide").forEach(function(s,i){ s.classList.toggle("active", i===idx); });
  document.querySelectorAll(".c-dot").forEach(function(d,i){ d.classList.toggle("active", i===idx); });
  var s = SLIDES[idx];
  if(s){ var l = s[currentLang]||s.fr||s.en||{}; setText("cTitle",l.title||""); setText("cDesc",l.desc||""); }
  setText("cCounter",(idx+1)+" / "+SLIDES.length);
}

function cMove(dir){ cGo(cIdx+dir); }

function cSwipe(){
  var outer = document.getElementById("cOuter");
  if(!outer) return;
  var sx=0, sy=0, axis=null;
  outer.addEventListener("touchstart",function(e){ sx=e.touches[0].clientX; sy=e.touches[0].clientY; axis=null; },{passive:true});
  outer.addEventListener("touchmove",function(e){
    if(!axis){ var dx=Math.abs(e.touches[0].clientX-sx),dy=Math.abs(e.touches[0].clientY-sy); axis=dx>dy?"h":"v"; }
    if(axis==="h") e.preventDefault();
  },{passive:false});
  outer.addEventListener("touchend",function(e){ if(axis==="h"){ var dx=e.changedTouches[0].clientX-sx; if(Math.abs(dx)>40) cMove(dx<0?1:-1); } },{passive:true});
  var ms=0, drag=false;
  outer.addEventListener("mousedown",function(e){ ms=e.clientX; drag=true; outer.classList.add("dragging"); });
  document.addEventListener("mouseup",function(e){ if(!drag) return; drag=false; outer.classList.remove("dragging"); if(Math.abs(e.clientX-ms)>50) cMove(e.clientX<ms?1:-1); });
  document.addEventListener("keydown",function(e){
    if(document.activeElement&&document.activeElement.tagName==="INPUT") return;
    if(e.key==="ArrowLeft") cMove(-1); if(e.key==="ArrowRight") cMove(1);
  });
}
